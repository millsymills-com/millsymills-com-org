version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: terraform
    directories:
      - /
      - /modules/org-baseline
      - /modules/repo-baseline
      - /modules/ruleset-default-branch
      - /modules/ruleset-tag-protection
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      providers:
        patterns: ["*"]
