name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # gitleaks-action v2.x requires a paid license for organization repos.
      # Run the upstream gitleaks binary directly (Apache-2.0, free). Version
      # mirrors the pre-commit hook in .pre-commit-config.yaml for parity.
      - name: Install gitleaks
        env:
          GL_VER: 8.21.2
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}" gitleaks
          chmod +x "${RUNNER_TEMP}/gitleaks"
          "${RUNNER_TEMP}/gitleaks" version

      - name: Run gitleaks
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/gitleaks" git --no-banner --redact --verbose --exit-code 1
