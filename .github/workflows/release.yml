name: release

# Verifies that every `v*` tag object is signed by an approved key listed in
# `.github/allowed_signers`. The tag-protection ruleset blocks update/delete
# of `v*` refs but does not verify signed tag objects; this workflow closes
# that gap. Unsigned or wrong-signer tags fail here.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  # Do not cancel an in-flight verification of a sibling tag; each tag push
  # gets its own ref and runs to completion.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-signed-tag:
    name: verify-signed-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Configure allowed signers
        run: git config gpg.ssh.allowedSignersFile .github/allowed_signers

      - name: Verify tag signature
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: git verify-tag "$GITHUB_REF_NAME"

      - name: Summary
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: echo "$GITHUB_REF_NAME verified" >> "$GITHUB_STEP_SUMMARY"
