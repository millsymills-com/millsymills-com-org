name: tofu-apply

on:
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - ".github/workflows/tofu-*.yml"
      - "modules/**"
      - "repos_*.tf"
      - "org.tf"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# No ref key. All apply runs target main, so serialization should be global.
concurrency:
  group: tofu-apply
  cancel-in-progress: false

jobs:
  apply:
    name: apply
    runs-on: ubuntu-24.04
    environment: tofu-apply
    timeout-minutes: 30

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.opentofu.org:443
            get.opentofu.org:443
            release-assets.githubusercontent.com:443
            sts.amazonaws.com:443
            sts.us-west-1.amazonaws.com:443
            s3.us-west-1.amazonaws.com:443
            tfstate-millsymills-025507317036.s3.us-west-1.amazonaws.com:443
            secretsmanager.us-west-1.amazonaws.com:443
            kms.us-west-1.amazonaws.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: 1.10.3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::025507317036:role/gha-millsymills-org-tofu-apply
          aws-region: us-west-1

      - name: Fetch writer App key to a tempfile
        run: |
          set -euo pipefail
          PEM_FILE="${RUNNER_TEMP}/writer-app.pem"
          umask 077
          aws secretsmanager get-secret-value \
            --secret-id github-app-key/millsymills-org-bot-writer \
            --query SecretString --output text > "${PEM_FILE}"
          chmod 600 "${PEM_FILE}"
          echo "TF_VAR_github_app_pem_file=${PEM_FILE}" >> "${GITHUB_ENV}"

      - name: tofu init
        run: tofu init -input=false

      - name: tofu plan
        env:
          TF_VAR_github_app_id: ${{ vars.WRITER_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ vars.WRITER_INSTALLATION_ID }}
        run: tofu plan -no-color -lock-timeout=120s -out=tfplan

      - name: tofu apply
        env:
          TF_VAR_github_app_id: ${{ vars.WRITER_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ vars.WRITER_INSTALLATION_ID }}
        run: tofu apply -no-color -lock-timeout=120s -auto-approve tfplan

      - name: Cleanup tfplan and pem
        if: always()
        run: |
          rm -f tfplan "${RUNNER_TEMP}/writer-app.pem"
