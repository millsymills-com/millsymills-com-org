name: tofu-apply

on:
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - ".github/workflows/tofu-*.yml"
      - "modules/**"
      - "repos_*.tf"
      - "org.tf"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# No ref key. All apply runs target main, so serialization should be global.
concurrency:
  group: tofu-apply
  cancel-in-progress: false

jobs:
  apply:
    name: apply
    runs-on: ubuntu-24.04
    environment: tofu-apply
    timeout-minutes: 30

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.opentofu.org:443
            sts.amazonaws.com:443
            s3.us-west-1.amazonaws.com:443
            tfstate-millsymills-025507317036.s3.us-west-1.amazonaws.com:443
            secretsmanager.us-west-1.amazonaws.com:443
            kms.us-west-1.amazonaws.com:443

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@592200bd4b9bbf4772ace78f887668b1aee8f716 # v1.0.5
        with:
          tofu_version: 1.10.3

      - name: Debug direct STS call (temporary)
        run: |
          set -euo pipefail
          TOKEN=$(curl -sLS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r '.value')
          echo "=== direct sts assume-role-with-web-identity ==="
          set +e
          aws sts assume-role-with-web-identity \
            --role-arn arn:aws:iam::025507317036:role/gha-millsymills-org-tofu-apply \
            --role-session-name debug-session \
            --web-identity-token "${TOKEN}" \
            --region us-west-1 2>&1
          echo "exit=$?"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::025507317036:role/gha-millsymills-org-tofu-apply
          aws-region: us-west-1

      - name: Fetch writer App key to a tempfile
        run: |
          set -euo pipefail
          PEM_FILE="${RUNNER_TEMP}/writer-app.pem"
          umask 077
          aws secretsmanager get-secret-value \
            --secret-id github-app-key/millsymills-org-bot-writer \
            --query SecretString --output text > "${PEM_FILE}"
          chmod 600 "${PEM_FILE}"
          echo "TF_VAR_github_app_pem_file=${PEM_FILE}" >> "${GITHUB_ENV}"

      - name: tofu init
        run: tofu init -input=false

      - name: tofu plan
        env:
          TF_VAR_github_app_id: ${{ vars.WRITER_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ vars.WRITER_INSTALLATION_ID }}
        run: tofu plan -no-color -lock-timeout=120s -out=tfplan

      - name: tofu apply
        env:
          TF_VAR_github_app_id: ${{ vars.WRITER_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ vars.WRITER_INSTALLATION_ID }}
        run: tofu apply -no-color -lock-timeout=120s -auto-approve tfplan

      - name: Cleanup tfplan and pem
        if: always()
        run: |
          rm -f tfplan "${RUNNER_TEMP}/writer-app.pem"
