name: tofu-drift

on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: tofu-drift
  cancel-in-progress: false

jobs:
  drift:
    name: drift
    runs-on: ubuntu-24.04
    environment: tofu-drift
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.opentofu.org:443
            get.opentofu.org:443
            release-assets.githubusercontent.com:443
            sts.amazonaws.com:443
            s3.us-west-1.amazonaws.com:443
            tfstate-millsymills-025507317036.s3.us-west-1.amazonaws.com:443
            secretsmanager.us-west-1.amazonaws.com:443
            kms.us-west-1.amazonaws.com:443

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@592200bd4b9bbf4772ace78f887668b1aee8f716 # v1.0.5
        with:
          tofu_version: 1.10.3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::025507317036:role/gha-millsymills-org-tofu-drift
          aws-region: us-west-1

      - name: Fetch writer App key to a tempfile
        run: |
          set -euo pipefail
          PEM_FILE="${RUNNER_TEMP}/writer-app.pem"
          umask 077
          aws secretsmanager get-secret-value \
            --secret-id github-app-key/millsymills-org-bot-writer \
            --query SecretString --output text > "${PEM_FILE}"
          chmod 600 "${PEM_FILE}"
          echo "TF_VAR_github_app_pem_file=${PEM_FILE}" >> "${GITHUB_ENV}"

      - name: tofu init
        run: tofu init -input=false

      - name: tofu plan -detailed-exitcode
        id: drift_plan
        env:
          TF_VAR_github_app_id: ${{ vars.WRITER_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ vars.WRITER_INSTALLATION_ID }}
        continue-on-error: true
        run: |
          set +e
          tofu plan -no-color -detailed-exitcode -lock-timeout=120s 2>&1 | tee plan.txt
          # detailed-exitcode: 0 = no changes, 1 = error, 2 = drift
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open or update drift issue
        if: steps.drift_plan.outputs.exitcode == '2'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PLAN_TEXT_PATH: plan.txt
        with:
          script: |
            const fs = require('fs');
            const body = '```\n' + fs.readFileSync(process.env.PLAN_TEXT_PATH, 'utf8').slice(0, 60000) + '\n```';
            const title = 'Drift detected by nightly tofu plan';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift',
              state: 'open',
            });
            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift'],
              });
            }

      - name: Open drift-error issue
        if: steps.drift_plan.outputs.exitcode == '1'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PLAN_TEXT_PATH: plan.txt
        with:
          script: |
            const fs = require('fs');
            const body = '```\n' + fs.readFileSync(process.env.PLAN_TEXT_PATH, 'utf8').slice(0, 60000) + '\n```';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Drift workflow error',
              body: body,
              labels: ['drift-error'],
            });

      - name: Fail if drift or error
        if: steps.drift_plan.outputs.exitcode != '0'
        run: exit 1
