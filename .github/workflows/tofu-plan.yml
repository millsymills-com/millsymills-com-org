name: tofu

on:
  pull_request:
    branches: [main]
    # No paths filter: the management-repo required-status-checks ruleset
    # requires `gate` to report on every PR. With a paths filter, doc-only
    # PRs would never trigger this workflow and would deadlock waiting for
    # the required check. Cost is ~30s of validate per PR; tofu plan
    # short-circuits to "no changes" when no .tf files differ.

# CANARY MODIFICATION (PR #63 — see https://github.com/millsymills-com/millsymills-com-org/issues/53 ; this commit will not be merged).
# Workflow-level permissions are read-only by default. Jobs that need write
# scopes or OIDC tokens declare them explicitly. This stops the uncredentialed
# validate job from inheriting any token capability that PR-controlled code
# (provider plugins, tflint plugins) could exploit.
permissions:
  contents: read

concurrency:
  group: tofu-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    # Runs on EVERY PR including fork PRs. Uncredentialed: no AWS, no App key,
    # no provider API calls. Required check; always actually executes, so a
    # fork PR cannot bypass validation via GitHub's "skipped == passing" rule.
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.opentofu.org:443
            get.opentofu.org:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: 1.10.3

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.55.1

      - name: tofu fmt -check
        run: tofu fmt -check -recursive

      - name: tofu init (no backend)
        run: tofu init -backend=false -input=false

      - name: tofu validate
        run: tofu validate

      - name: tflint
        # GITHUB_TOKEN lifts `tflint --init`'s plugin-fetch quota from the
        # 60/hr anonymous IP quota (shared across GHA tenants on the runner's
        # public IP) to the 5000/hr installation quota. Without it, plugin
        # installs intermittently 403 on noisy runners. See #24.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tflint --init
          tflint --recursive --format=compact

  plan:
    name: plan
    # Credentialed plan: runs only on INTERNAL PRs. Fork PRs skip this job; the
    # gate job below enforces required-check semantics correctly for both.
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    permissions:
      id-token: write
      pull-requests: write
      contents: read
    runs-on: ubuntu-24.04
    environment: tofu-plan
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          # block, not audit. Audit-only would let a malicious PR exfiltrate
          # the plan-role credentials or the reader App PEM by curl'ing them
          # out before the audit log is shipped. Block enforces the allowlist.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.opentofu.org:443
            get.opentofu.org:443
            release-assets.githubusercontent.com:443
            sts.amazonaws.com:443
            sts.us-west-1.amazonaws.com:443
            s3.us-west-1.amazonaws.com:443
            tfstate-millsymills-025507317036.s3.us-west-1.amazonaws.com:443
            secretsmanager.us-west-1.amazonaws.com:443
            kms.us-west-1.amazonaws.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: 1.10.3

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.55.1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::025507317036:role/gha-millsymills-org-tofu-plan
          aws-region: us-west-1

      - name: Fetch reader App key to a tempfile
        id: app_key
        run: |
          set -euo pipefail
          PEM_FILE="${RUNNER_TEMP}/reader-app.pem"
          umask 077
          aws secretsmanager get-secret-value \
            --secret-id github-app-key/millsymills-org-bot-reader \
            --query SecretString --output text > "${PEM_FILE}"
          chmod 600 "${PEM_FILE}"
          echo "TF_VAR_github_app_pem_file=${PEM_FILE}" >> "${GITHUB_ENV}"

      - name: tofu init
        run: tofu init -input=false

      - name: tofu plan
        id: plan
        env:
          TF_VAR_github_app_id: ${{ vars.READER_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ vars.READER_INSTALLATION_ID }}
        run: |
          set -euo pipefail
          tofu plan -no-color -lock-timeout=120s 2>&1 | tee plan.txt

      - name: Post plan as PR comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: tofu-plan
          path: plan.txt

  gate:
    name: gate
    # Single required-status-check for the management-repo ruleset. Always
    # runs (if: always()), regardless of whether plan was skipped on a fork PR
    # or failed on an internal PR. Encodes the conditional rule:
    #   - validate must succeed (always required, fork and internal)
    #   - plan must succeed OR be skipped (skipped is the fork-PR case)
    # Closes the loophole where a skipped check is treated as passing, AND the
    # loophole where an internal PR could merge without a real plan.
    needs: [validate, plan]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Verify upstream conclusions
        env:
          VALIDATE_RESULT: ${{ needs.validate.result }}
          PLAN_RESULT: ${{ needs.plan.result }}
          IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail
          echo "validate=${VALIDATE_RESULT} plan=${PLAN_RESULT} is_fork=${IS_FORK}"
          if [[ "${VALIDATE_RESULT}" != "success" ]]; then
            echo "FAIL: validate did not succeed"
            exit 1
          fi
          if [[ "${IS_FORK}" == "true" ]]; then
            if [[ "${PLAN_RESULT}" != "skipped" ]]; then
              echo "FAIL: fork PR — plan should be skipped, got ${PLAN_RESULT}"
              exit 1
            fi
          else
            if [[ "${PLAN_RESULT}" != "success" ]]; then
              echo "FAIL: internal PR — plan must succeed, got ${PLAN_RESULT}"
              exit 1
            fi
          fi
          echo "OK"
