name: zizmor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No paths filter: required check for the management repo, must report on every PR.
permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: ".github/workflows/"
          # GHAS is not enabled on this repo (Free plan). Without this,
          # zizmor-action uploads SARIF, which surfaces as a second
          # `zizmor` check-run owned by github-advanced-security that
          # stays queued forever and deadlocks the required-check ruleset.
          advanced-security: false
