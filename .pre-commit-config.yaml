repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  # We use OpenTofu, not HashiCorp Terraform. pre-commit-terraform's hooks
  # hardcode the `terraform` binary and don't fully understand OpenTofu's
  # state/lock-file format. Replaced with local hooks that invoke `tofu`
  # directly. Modules cover all .tf files; tflint runs recursively.
  - repo: local
    hooks:
      - id: tofu-fmt
        name: tofu fmt
        entry: tofu fmt -check -recursive
        language: system
        files: \.tf$
        pass_filenames: false

      - id: tflint
        name: tflint
        entry: tflint --recursive --format=compact
        language: system
        files: \.tf$
        pass_filenames: false

      # Plan completed-docs must never contain literal `YYYY-MM-DD`
      # placeholder strings — those leak intent and signal that a date
      # field was never filled in. Issue #43.
      - id: forbid-yyyy-mm-dd-placeholder
        name: forbid YYYY-MM-DD placeholder in completed plan docs
        entry: >-
          bash -c 'if grep -nE "YYYY-MM-DD" "$@"; then echo "ERROR
          - YYYY-MM-DD placeholder above. Fill in actual date before commit." >&2; exit 1; fi' --
        language: system
        files: ^docs/superpowers/plans/.*\.completed\.md$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
